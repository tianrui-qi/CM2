<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neuron ROI Visualization</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <div id="map-plot" class="fullscreen-map"></div>

    <div id="status-banner" class="status-banner">Loading cache…</div>

    <aside class="overlay-stack">
      <section class="glass-panel source-panel">
        <div id="shared-source-toggle" class="trace-source-toggle"></div>
      </section>

      <section class="glass-panel plot-panel">
        <div class="plot-card-header">
          <h4>Trace</h4>
          <button id="download-c-traces-btn" class="mini-btn">Download SVG</button>
        </div>
        <div class="plot-scroll">
          <div id="c-trace-plot" class="plot-frame"></div>
        </div>
      </section>

      <section class="glass-panel plot-panel">
        <div class="plot-card-header">
          <h4>Heatmap</h4>
          <button id="download-c-heatmap-btn" class="mini-btn">Download SVG</button>
        </div>
        <div class="plot-scroll">
          <div id="c-heatmap-plot" class="plot-frame"></div>
        </div>
      </section>
    </aside>

    <div class="roi-dock">
      <button id="add-roi-btn" class="primary-btn roi-add-btn">+</button>
      <div id="roi-list" class="roi-strip"></div>
    </div>
  </div>

  <script src="/vendor/plotly.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
