crop:
  x_load_path: ???
  y_load_path: ???
  y_save_fold: null   # default: y_load_path without suffix
  frame: [0, -1]
  chunk_size: 32
  # true: stitched seam-aware patching; 
  # false: regular tile grid patching
  after_stitch: true
  # seam
  seam_width: 4
  tile_size: 500
  match_point_1: [[1884, 895], [292, 891]]
  match_point_2: [[1623, 895], [91, 908]]
  match_point_3: [[1264, 1277], [1234, 72]]
  # seam filter
  coverage_ratio: 0.5
  min_patch_size: 40
  # patch
  pad: 20
